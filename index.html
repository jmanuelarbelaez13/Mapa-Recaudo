function getCat(tipo){
  if(tipo.includes('Cable')||tipo.includes('elef')) return {color:'#1A7EA8',icon:'🚡'};

  return {color:'#E8541A',icon:'🚌'};
}
function scol(e){
  if(!e) return '#6b7280';
  var s=e.toLowerCase();
  if(s.includes('operand')||s.includes('operaci')) return '#16a34a';
  if(s.includes('ejecuci')||s.includes('construcci')||s.includes('adjudic')||s.includes('licitaci')) return '#d97706';
  if(s.includes('cancelad')) return '#dc2626';
  return '#6b7280';
}
function slbl(e){
  if(!e) return '';
  var s=e.toLowerCase();
  if(s.includes('operand')||s.includes('operaci')) return 'Operando';
  if(s.includes('adjudic')) return 'Adjudicado';
  if(s.includes('licitaci')) return 'En licitación';
  if(s.includes('ejecuci')||s.includes('construcci')) return 'En construcción';
  if(s.includes('cancelad')) return 'Cancelado';
  if(s.includes('estructuraci')) return 'En estructuración';
  return e;
}

var map=L.map('map').setView([0,-65],3);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'OpenStreetMap | CARTO',maxZoom:18}).addTo(map);

function mkI(d){
  var t=getCat(d.tipo),sc=scol(d.estado);
  return L.divIcon({className:'',html:
    '<div style="position:relative;width:34px;height:34px">'+
    '<div style="width:34px;height:34px;background:'+t.color+';border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid rgba(255,255,255,.95)">'+t.icon+'</div>'+
    '<div style="position:absolute;bottom:-2px;right:-2px;width:11px;height:11px;border-radius:50%;background:'+sc+';border:2px solid #fff"></div>'+
    '</div>',iconSize:[34,34],iconAnchor:[17,17],popupAnchor:[0,-20]});
}

function mkP(d){
  var t=getCat(d.tipo),sc=scol(d.estado),sl=slbl(d.estado);
  return '<div class="pp-top" style="background:'+t.color+'">'+
    '<div class="pp-ico">'+t.icon+'</div>'+
    '<div class="pp-tm"><h3>'+d.proyecto+'</h3><small>'+d.tipo+' · '+d.ciudad+'</small></div></div>'+
    '<div class="pp-body">'+
    '<span class="pp-code">'+d.id+'</span>'+
    '<span class="sp" style="background:'+sc+'22;color:'+sc+'">'+sl+'</span>'+
    '<div class="pp-r" style="margin-top:6px"><b>Entidad contratante:</b> '+d.entidad+'</div>'+
    '<div class="pp-r"><b>Fecha apertura:</b> '+d.fecha+'</div>'+
    '<div class="pp-r"><b>Ciudad / País:</b> '+d.ciudad+'</div>'+
    '<div class="pp-obj"><b>Objeto:</b> '+d.objeto+'</div>'+
    '<div class="pp-adj">👤 Adjudicatario: '+d.adj+'</div>'+
    '</div>';
}

var layers=[];
function render(f){
  layers.forEach(function(l){map.removeLayer(l)});layers=[];
  var items=D.filter(function(d){
    if(f==='all') return true;
    if(f==='col') return d.pais==='Colombia';
    if(f==='bra') return d.pais==='Brasil';
    if(f==='mex') return d.pais==='México';
    if(f==='per') return d.pais==='Perú';
    if(f==='brt') return d.tipo==='BRT';
    if(f==='cable') return d.tipo==='Cable aéreo';
    if(f==='ferreo') return d.tipo==='Férreo';
    return true;
  });
  items.forEach(function(d){
    var m=L.marker([d.la,d.lo],{icon:mkI(d)}).addTo(map);
    m.bindPopup(mkP(d),{maxWidth:370});
    layers.push(m);
  });
  if(layers.length) map.fitBounds(L.featureGroup(layers).getBounds().pad(.12));
  bList(items);
}
function sv(v,el){
  document.querySelectorAll('.nav button').forEach(function(b){b.classList.remove('active')});
  if(el) el.classList.add('active');
  render(v);
}
function bList(items){
  var el=document.getElementById('pl');el.innerHTML='';
  items.forEach(function(d){
    var t=getCat(d.tipo);
    var div=document.createElement('div');div.className='pi';
    div.innerHTML='<div class="mic" style="background:'+t.color+'">'+t.icon+'</div>'+
      '<div><div class="pn">'+d.proyecto+'</div><div class="pc">'+d.id+' · '+d.ciudad+' · '+d.fecha+'</div></div>';
    div.onclick=function(){
      map.setView([d.la,d.lo],10);
      setTimeout(function(){layers.forEach(function(l){if(l.getLatLng&&Math.abs(l.getLatLng().lat-d.la)<.02)l.openPopup()})},300);
    };
    el.appendChild(div);
  });
}
render('all');
</script>
